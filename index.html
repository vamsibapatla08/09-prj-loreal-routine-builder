<!doctype html>
<html lang="en" id="htmlElement">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <!-- Bootstrap RTL CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <div class="header-top">
          <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
          <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
          <button
            id="themeToggleBtn"
            class="theme-toggle-btn"
            type="button"
            aria-label="Switch to dark mode"
            title="Switch to dark mode"
          >
            <i class="fa-solid fa-moon" aria-hidden="true"></i>
            <span>Dark Mode</span>
          </button>
          <!--<div class="language-toggle">
            <button id="enLangBtn" class="lang-btn active" title="English">
              EN
            </button>
            <button id="arLangBtn" class="lang-btn" title="العربية">AR</button>
          </div>-->
        </div>
      </header>

      <!-- Category Filter and Search -->
      <div class="search-section">
        <select id="categoryFilter">
          <option value="" disabled selected>Choose a Category</option>
          <option value="cleanser">Cleansers</option>
          <option value="moisturizer">Moisturizers & Treatments</option>
          <option value="haircare">Haircare</option>
          <option value="makeup">Makeup</option>
          <option value="hair color">Hair Color</option>
          <option value="hair styling">Hair Styling</option>
          <option value="men's grooming">Men's Grooming</option>
          <option value="suncare">Suncare</option>
          <option value="fragrance">Fragrance</option>
        </select>
        <input
          type="text"
          id="productSearch"
          class="product-search"
          placeholder="Search by name or keyword..."
          aria-label="Search products"
        />
      </div>

      <!-- Products Grid -->
      <div id="productsContainer" class="products-grid"></div>

      <!-- Selected Products -->
      <div class="selected-products">
        <h2>Selected Products</h2>
        <div id="selectedProductsList"></div>
        <div class="button-group">
          <button id="generateRoutine" class="generate-btn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
          </button>
          <button id="clearAllBtn" class="clear-btn">
            <i class="fa-solid fa-trash"></i> Clear All
          </button>
        </div>
      </div>

      <!------- Chat Area ------->
      <section class="chatbox">
        <h2>Let's Build Your Routine</h2>
        <div id="chatWindow" class="chat-window"></div>
        <form id="chatForm" class="chat-form">
          <label for="userInput" class="visually-hidden">Message</label>
          <input
            id="userInput"
            name="userInput"
            type="text"
            placeholder="Ask me about products or routines…"
            autocomplete="off"
            required
          />
          <button type="submit" id="sendBtn">
            <i class="fa-solid fa-paper-plane"></i>
            <span class="visually-hidden">Send</span>
          </button>
        </form>
      </section>

      <!-- Product Description Modal -->
      <div
        id="productModal"
        class="modal"
        role="dialog"
        aria-labelledby="modalTitle"
        aria-hidden="true"
      >
        <div class="modal-backdrop"></div>
        <div class="modal-content">
          <button class="modal-close" aria-label="Close product details">
            <i class="fa-solid fa-xmark"></i>
          </button>
          <div class="modal-body">
            <img
              id="modalProductImage"
              src=""
              alt=""
              class="modal-product-image"
            />
            <div class="modal-product-info">
              <h2 id="modalTitle"></h2>
              <p id="modalBrand" class="modal-brand"></p>
              <p id="modalDescription" class="modal-description"></p>
            </div>
          </div>
        </div>
      </div>

      <!-- Confirmation Modal for Clear All -->
      <div
        id="confirmationModal"
        class="modal confirmation-modal"
        role="dialog"
        aria-labelledby="confirmTitle"
        aria-hidden="true"
      >
        <div class="modal-backdrop"></div>
        <div class="modal-content">
          <h2 id="confirmTitle">Clear All Products?</h2>
          <p id="confirmMessage">
            Are you sure you want to clear all selected products?
          </p>
          <div class="confirmation-buttons">
            <button id="confirmYesBtn" class="confirm-btn confirm-yes">
              <i class="fa-solid fa-check"></i> Yes, Clear All
            </button>
            <button id="confirmNoBtn" class="confirm-btn confirm-no">
              <i class="fa-solid fa-xmark"></i> Cancel
            </button>
          </div>
        </div>
      </div>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>L'Oréal chatbot; 2026 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- secrets.js can be removed when using Cloudflare Workers for API requests -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>

  <script>
    // Simple AI-based RTL detection using browser language and known RTL language codes
    const rtlLangs = [
      "ar",
      "he",
      "fa",
      "ur",
      "ps",
      "dv",
      "yi",
      "ku",
      "ug",
      "sd",
    ];
    function isRtlLanguage(lang) {
      // Check if the language code starts with any RTL language
      return rtlLangs.some((rtl) => lang.toLowerCase().startsWith(rtl));
    }

    function applyRtlIfNeeded() {
      // Use browser language or page lang attribute
      const lang =
        document.documentElement.lang ||
        navigator.language ||
        navigator.userLanguage ||
        "en";
      if (isRtlLanguage(lang)) {
        document.documentElement.setAttribute("dir", "rtl");
        document.body.setAttribute("dir", "rtl");
      } else {
        document.documentElement.setAttribute("dir", "ltr");
        document.body.setAttribute("dir", "ltr");
      }
    }

    // Run on page load and when language changes (if supported)
    applyRtlIfNeeded();
    if ("MutationObserver" in window) {
      // Observe changes to the <html> lang attribute
      const observer = new MutationObserver(applyRtlIfNeeded);
      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ["lang"],
      });
    }
  </script>
</html>
